services:
  postgres:
    image: postgres:16-bookworm
    container_name: clash-postgres
    restart: always
    profiles: [local]
    env_file: .env
    volumes:
      - ./data/postgres-local:/var/lib/postgresql/data
    ports:
      - "192.168.7.58:5432:5432"
    environment:
      - POSTGRES_DB=clash_stats
      - POSTGRES_USER=clash_stats
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    command: >
      -c shared_buffers=2GB
      -c work_mem=64MB
      -c maintenance_work_mem=1GB
      -c effective_cache_size=4GB
    networks:
      - media-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clash_stats"]
      interval: 10s
      timeout: 5s
      retries: 5

  cr-tracker:
    build:
      context: .
      network: host
    container_name: cr-tracker
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - FETCH_INTERVAL=14400  # 4 hours in seconds
      - BROWSER_WS_URL=http://cr-browser:9223
      - ROYALEAPI_SESSION_PATH=/app/data/royaleapi_session.json
      - DATABASE_URL=postgresql://clash_stats:${DB_PASSWORD}@clash-postgres/clash_stats
    volumes:
      - ./data:/app/data
      - ./.git:/app/.git:rw
      - ~/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
    shm_size: '2gb'
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "109"  # render group GID for Intel GPU access
    depends_on:
      - cr-browser
      - postgres
    networks:
      - media-network
    ports:
      - "8078:8078"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8078/"]
      interval: 30s
      timeout: 10s
      retries: 3

  cr-browser:
    build: docker/browser
    container_name: cr-browser
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "6080:6080"
    shm_size: '1gb'
    volumes:
      - ./data:/app/data

  cr-samv2:
    build: docker/samv2
    container_name: cr-samv2
    restart: "no"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "109"  # render group GID for Intel Arc GPU
    networks:
      - media-network
    ports:
      - "8079:8079"
    volumes:
      - ./data:/app/data
      - ./replays:/app/replays
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8079/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - media-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - media-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./docker/monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - media-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_UNIFIED_ALERTING_ENABLED=true
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    depends_on:
      - prometheus
      - loki
    networks:
      - media-network

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  media-network:
    external: true
