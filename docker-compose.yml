services:
  postgres:
    image: tensorchord/vchord-postgres:pg17-v0.5.3
    container_name: clash-postgres
    restart: always
    env_file: .env
    # Default Docker shm_size is 64MB — too small for parallel hash joins.
    # 2GB matches cr-tracker and is well within RAM budget on this host.
    shm_size: '2gb'
    volumes:
      - /data-hot/pg-data/data:/var/lib/postgresql/data
      - /data-cold/backups:/backups
    ports:
      - "192.168.7.58:5432:5432"
    environment:
      - POSTGRES_DB=clash_stats
      - POSTGRES_USER=clash_stats
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    command: >
      -c shared_buffers=4GB
      -c work_mem=128MB
      -c maintenance_work_mem=2GB
      -c effective_cache_size=32GB
      -c shared_preload_libraries=vchord.so
    networks:
      - media-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clash_stats"]
      interval: 10s
      timeout: 5s
      retries: 5

  cr-tracker:
    build:
      context: .
      network: host
    container_name: cr-tracker
    restart: unless-stopped
    # Yield CPU to higher-priority containers when contended (default is 1024).
    cpu_shares: 256
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - FETCH_INTERVAL=14400  # 4 hours in seconds
      - BROWSER_WS_URL=http://cr-browser:9223
      - ROYALEAPI_SESSION_PATH=/app/data/royaleapi_session.json
      # RoyaleAPI request-rate cap (req/s), defense-in-depth only. The real
      # control is keeping cf_clearance fresh (auto-refresh via FlareSolverr) —
      # a fresh token tolerates concurrency 8 cleanly. This cap just bounds the
      # blast radius if a refresh fails and we fall back to a stale token.
      - ROYALEAPI_REQUESTS_PER_SEC=10.0
      - DATABASE_URL=postgresql://clash_stats:${DB_PASSWORD}@clash-postgres,192.168.7.62/clash_stats?target_session_attrs=read-write
      - DASHBOARD_DATABASE_URL=postgresql://clash_stats:${DB_PASSWORD}@192.168.7.62/clash_stats
    volumes:
      - ./data:/app/data
      - ./.git:/app/.git:rw
      - ~/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      # ml_models lives on the ml-data ZFS dataset; data/ml_models is a symlink
      # pointing here, so the container needs the same absolute path visible.
      - /mnt/mirror/ml_models:/mnt/mirror/ml_models:rw
    shm_size: '2gb'
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "109"  # render group GID for Intel GPU access
    depends_on:
      - postgres
    networks:
      - media-network
    ports:
      - "8078:8078"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8078/"]
      interval: 30s
      timeout: 10s
      retries: 3

  cr-browser:
    # Dormant — only needed to refresh the RoyaleAPI cf_clearance cookie when
    # it expires. Start manually with: docker compose up -d cr-browser
    build: docker/browser
    container_name: cr-browser
    restart: "no"
    networks:
      - media-network
    ports:
      - "6080:6080"
    shm_size: '1gb'
    volumes:
      - ./data:/app/data

  cr-samv2:
    build: docker/samv2
    container_name: cr-samv2
    restart: "no"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "109"  # render group GID for Intel Arc GPU
    networks:
      - media-network
    ports:
      - "8079:8079"
    volumes:
      - ./data:/app/data
      - ./replays:/app/replays
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8079/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - media-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - media-network
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./docker/monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - media-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_UNIFIED_ALERTING_ENABLED=true
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    depends_on:
      - prometheus
      - loki
    networks:
      - media-network

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  media-network:
    external: true
