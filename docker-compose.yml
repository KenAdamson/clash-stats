services:
  postgres:
    image: tensorchord/vchord-postgres:pg17-v0.5.3
    container_name: clash-postgres
    restart: always
    env_file: .env
    # Default Docker shm_size is 64MB — too small for parallel hash joins.
    # 2GB matches cr-tracker and is well within RAM budget on this host.
    shm_size: '2gb'
    volumes:
      - /data-hot/pg-data/data:/var/lib/postgresql/data
      - /data-cold/backups:/backups
    ports:
      - "192.168.7.58:5432:5432"
    environment:
      - POSTGRES_DB=clash_stats
      - POSTGRES_USER=clash_stats
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    command: >
      -c shared_buffers=4GB
      -c work_mem=128MB
      -c maintenance_work_mem=2GB
      -c effective_cache_size=32GB
      -c shared_preload_libraries=vchord.so
    networks:
      - media-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clash_stats"]
      interval: 10s
      timeout: 5s
      retries: 5

  cr-tracker:
    build:
      context: .
      network: host
    container_name: cr-tracker
    restart: unless-stopped
    # Yield CPU to higher-priority containers when contended (default is 1024).
    cpu_shares: 256
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - FETCH_INTERVAL=14400  # 4 hours in seconds
      - BROWSER_WS_URL=http://cr-browser:9223
      - ROYALEAPI_SESSION_PATH=/app/data/royaleapi_session.json
      # RoyaleAPI request-rate cap (req/s), defense-in-depth only. The real
      # control is keeping cf_clearance fresh (auto-refresh via FlareSolverr) —
      # a fresh token tolerates concurrency 8 cleanly. This cap just bounds the
      # blast radius if a refresh fails and we fall back to a stale token.
      - ROYALEAPI_REQUESTS_PER_SEC=10.0
      # Route ALL RoyaleAPI traffic through the dedicated scraper VPN exit.
      # Both the proxy and the cf_clearance minter share that one Mullvad IP,
      # keeping our residential IP (banned 06-08) off RoyaleAPI entirely.
      - ROYALEAPI_PROXY=http://cr-scraper-vpn:8888
      - FLARESOLVERR_URL=http://cr-scraper-vpn:8191/v1
      - DATABASE_URL=postgresql://clash_stats:${DB_PASSWORD}@clash-postgres,192.168.7.62/clash_stats?target_session_attrs=read-write
      - DASHBOARD_DATABASE_URL=postgresql://clash_stats:${DB_PASSWORD}@192.168.7.62/clash_stats
    volumes:
      - ./data:/app/data
      - ./.git:/app/.git:rw
      - ~/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
      # ml_models lives on the ml-data ZFS dataset; data/ml_models is a symlink
      # pointing here, so the container needs the same absolute path visible.
      - /mnt/mirror/ml_models:/mnt/mirror/ml_models:rw
    shm_size: '2gb'
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "109"  # render group GID for Intel GPU access
    depends_on:
      - postgres
    networks:
      - media-network
    ports:
      - "8078:8078"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8078/"]
      interval: 30s
      timeout: 10s
      retries: 3

  cr-browser:
    # Dormant — only needed to refresh the RoyaleAPI cf_clearance cookie when
    # it expires. Start manually with: docker compose up -d cr-browser
    build: docker/browser
    container_name: cr-browser
    restart: "no"
    networks:
      - media-network
    ports:
      - "6080:6080"
    shm_size: '1gb'
    volumes:
      - ./data:/app/data

  # Dedicated VPN exit for RoyaleAPI scraping ONLY. Isolated from flare-it
  # (which the *arr stack shares) so scraping can never burn that exit's IP.
  # Mullvad WireGuard, Exact-Dodo device, pinned to ee-tll-wg-003 (xtom/Estonia,
  # non-M247 = CF-trusted, distinct IP from flare-it's -002). After the 06-08
  # residential-IP ban, all replay traffic egresses here instead.
  cr-scraper-vpn:
    image: qmcgaw/gluetun:latest
    container_name: cr-scraper-vpn
    cap_add: [NET_ADMIN]
    devices:
      - /dev/net/tun:/dev/net/tun
    networks:
      - media-network
    environment:
      VPN_SERVICE_PROVIDER: mullvad
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${SCRAPER_WG_PRIVATE_KEY}
      WIREGUARD_ADDRESSES: ${SCRAPER_WG_ADDRESS}
      SERVER_HOSTNAMES: ee-tll-wg-003
      TZ: America/New_York
      DNS_KEEP_NAMESERVER: "on"
      # Allow inbound from the docker subnet (so cr-tracker reaches the proxy +
      # control server) and the LAN (Pi-hole DNS).
      FIREWALL_OUTBOUND_SUBNETS: "172.17.1.0/24,192.168.7.0/24"
      # HTTP proxy for replay_http; control server for exit rotation later.
      HTTPPROXY: "on"
      HTTP_CONTROL_SERVER_ADDRESS: ":8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- https://am.i.mullvad.net/connected | grep -q 'connected to Mullvad' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  cr-scraper-fs:
    # FlareSolverr inside the scraper VPN's netns — mints cf_clearance from the
    # SAME exit IP that replay_http fetches through (the token is IP-bound).
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: cr-scraper-fs
    network_mode: "service:cr-scraper-vpn"
    depends_on:
      cr-scraper-vpn:
        condition: service_healthy
    environment:
      LOG_LEVEL: info
      HEADLESS: "true"
      TZ: America/New_York
    restart: unless-stopped

  cr-samv2:
    build: docker/samv2
    container_name: cr-samv2
    restart: "no"
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "109"  # render group GID for Intel Arc GPU
    networks:
      - media-network
    ports:
      - "8079:8079"
    volumes:
      - ./data:/app/data
      - ./replays:/app/replays
    shm_size: '2gb'
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8079/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - media-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - media-network
    healthcheck:
      test: ["CMD", "/usr/bin/loki", "--version"]
      interval: 30s
      timeout: 10s
      retries: 3

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./docker/monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - media-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_UNIFIED_ALERTING_ENABLED=true
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    depends_on:
      - prometheus
      - loki
    networks:
      - media-network

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  media-network:
    external: true
