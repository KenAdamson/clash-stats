services:
  cr-tracker:
    build: .
    container_name: cr-tracker
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - FETCH_INTERVAL=14400  # 4 hours in seconds
    volumes:
      - ./data:/app/data
    network_mode: bridge
    ports:
      - "8078:8078"
