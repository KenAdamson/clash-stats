services:
  cr-tracker:
    build: .
    container_name: cr-tracker
    restart: unless-stopped
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
      - FETCH_INTERVAL=14400  # 4 hours in seconds
      - BROWSER_WS_URL=http://cr-browser:9223
      - ROYALEAPI_SESSION_PATH=/app/data/royaleapi_session.json
    volumes:
      - ./data:/app/data
      - ./.git:/app/.git:rw
      - ~/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
    depends_on:
      - cr-browser
    networks:
      - media-network
    ports:
      - "8078:8078"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8078/"]
      interval: 30s
      timeout: 10s
      retries: 3

  cr-browser:
    build: docker/browser
    container_name: cr-browser
    restart: unless-stopped
    networks:
      - media-network
    ports:
      - "6080:6080"
    shm_size: '1gb'
    volumes:
      - ./data:/app/data

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - media-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    volumes:
      - ./docker/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    networks:
      - media-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    restart: unless-stopped
    command: ["run", "/etc/alloy/config.alloy"]
    volumes:
      - ./docker/monitoring/alloy-config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    networks:
      - media-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-changeme}
      - GF_UNIFIED_ALERTING_ENABLED=true
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
    depends_on:
      - prometheus
      - loki
    networks:
      - media-network

volumes:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  media-network:
    external: true
