/*
 * pgloader configuration: MariaDB → PostgreSQL migration
 *
 * Usage:
 *   pgloader scripts/pgloader.conf
 *
 * Prerequisites:
 *   - Both clash-mariadb and clash-postgres containers running
 *   - PostgreSQL database empty (fresh init)
 */

LOAD DATABASE
    FROM mysql://clash_stats:clash_stats_pw_2026@192.168.7.58:3306/clash_stats
    INTO postgresql://clash_stats:clash_stats_pw_2026@192.168.7.58:5432/clash_stats

WITH include drop, create tables, create indexes, reset sequences,
     workers = 4, concurrency = 2

CAST column battles.raw_json to jsonb,
     column player_snapshots.raw_json to jsonb

ALTER SCHEMA 'clash_stats' RENAME TO 'public'
;
