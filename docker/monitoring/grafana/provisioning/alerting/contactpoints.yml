apiVersion: 1

contactPoints:
  - orgId: 1
    name: discord-pipeline
    receivers:
      - uid: discord-webhook
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          use_discord_username: true
          message: |
            {{ range .Alerts }}
            **{{ .Labels.alertname }}** — {{ .Status | toUpper }}
            {{ .Annotations.summary }}
            {{ end }}
        disableResolveMessage: false
